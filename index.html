<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>William Hickox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111827;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .name {
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: -0.02em;
    }
    .underline {
      width: 48px;
      height: 2px;
      background: #F59E0B;
      margin-top: 12px;
      margin-bottom: 48px;
    }
    .section-title {
      font-size: 13px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 16px;
    }
    .card {
      display: block;
      background: #1F2937;
      border: 1px solid #374151;
      border-radius: 8px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .card:hover {
      border-color: #F59E0B;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
    }
    .badge {
      font-size: 11px;
      color: #F59E0B;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.25);
      border-radius: 4px;
      padding: 2px 8px;
      letter-spacing: 0.03em;
    }
    .card-desc {
      font-size: 14px;
      color: #9ca3af;
      margin-top: 6px;
      line-height: 1.5;
    }
    .footer {
      margin-top: 80px;
      font-size: 11px;
      color: #4b5563;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="name">William Hickox</div>
    <div class="underline"></div>

    <div class="section-title">Projects</div>

    <a class="card" href="https://pfd.ea.williamhickox.com" target="_blank" rel="noopener">
      <div class="card-header">
        <span class="card-title">PFD EA</span>
        <span class="badge">Login required</span>
      </div>
      <div class="card-desc">Algorithmic FOREX trading system &mdash; EURUSD H1</div>
    </a>

    <div class="footer">&copy; <script>document.write(new Date().getFullYear())</script> William Hickox</div>
  </div>
</body>
</html>
